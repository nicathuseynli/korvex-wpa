services:
  korvex-web:
    build: .
    container_name: korvex-web
    restart: unless-stopped
    # Reach host Postgres on 95.217.234.25 via the host network shortcut.
    # If you prefer bridge networking, set WEB_DATABASE_URL to a real IP/DNS.
    network_mode: host
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
